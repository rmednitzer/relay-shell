name: release

# Build + publish on a signed `v*` tag using PyPI trusted publishing
# (OIDC, no long-lived token). The flow has three gated jobs:
#
#   1. verify     - the tag is annotated, GPG/SSH-signed and verified by
#                   GitHub, and matches the version declared in pyproject.toml
#   2. build      - dev install, full test suite on the package floor
#                   (Python 3.12; per-PR CI already exercises 3.13/3.14),
#                   then `python -m build` to produce wheel + sdist
#   3. publish    - downloads the dist artifact and uploads to PyPI via
#                   OIDC, gated on the `pypi` environment so a human can
#                   require an approval click before the release goes live
#
# The PyPI side is wired through the trusted-publishing form at
# https://pypi.org/manage/account/publishing/ with:
#   project = relay-shell     owner = rmednitzer
#   repository = relay-shell  workflow = release.yml
#   environment = pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist and be signed)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify signed tag + version match
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      release_commit: ${{ steps.verify_tag.outputs.release_commit }}
    steps:
      - name: Resolve tag from trigger
        id: tag
        env:
          REF: ${{ github.ref }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="${REF#refs/tags/}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([+.\-].+)?$'; then
            echo "ERROR: $tag does not match the v<MAJOR>.<MINOR>.<PATCH> pattern" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Check out the RESOLVED tag, not the default branch. On a
      # `workflow_dispatch` re-run for an older tag, the default branch may
      # have moved past it - reading `pyproject.toml` from the working tree
      # without this `ref` would compare the tag against whatever version
      # currently sits on the default branch and falsely reject a valid
      # signed tag.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0
          # No step after checkout uses git auth (the tag signature is
          # verified via the REST API with an explicit GH_TOKEN, and the
          # version check reads the working tree), so do not persist the
          # token in .git/config (CI-2 finding; matches the SEC-2 posture).
          persist-credentials: false

      - name: Assert tag matches pyproject version (at the tagged commit)
        id: version
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "v$version" ]; then
            echo "ERROR: tag $TAG does not match pyproject version v$version (read from the tagged commit)" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "OK: tag $TAG matches pyproject version $version"

      - name: Verify tag signature via GitHub API
        id: verify_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          ref=$(curl -fsS -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/ref/tags/$TAG")
          obj_type=$(printf '%s' "$ref" | jq -r '.object.type')
          if [ "$obj_type" != "tag" ]; then
            echo "ERROR: $TAG is a lightweight tag; release tags MUST be annotated and signed" >&2
            exit 1
          fi
          obj_sha=$(printf '%s' "$ref" | jq -r '.object.sha')
          tag_obj=$(curl -fsS -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/tags/$obj_sha")
          ver=$(printf '%s' "$tag_obj" | jq -r '.verification')
          verified=$(printf '%s' "$ver" | jq -r '.verified')
          reason=$(printf '%s' "$ver" | jq -r '.reason')
          if [ "$verified" != "true" ]; then
            echo "ERROR: $TAG signature not verified by GitHub (reason: $reason)" >&2
            exit 1
          fi
          release_commit=$(printf '%s' "$tag_obj" | jq -r '.object.sha')
          if [ -z "$release_commit" ] || [ "$release_commit" = "null" ]; then
            echo "ERROR: could not resolve peeled commit for $TAG" >&2
            exit 1
          fi
          echo "release_commit=$release_commit" >> "$GITHUB_OUTPUT"
          echo "OK: $TAG is a signed annotated tag, verified ($reason); release commit $release_commit"

  build:
    name: Build wheel + sdist
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Sigstore OIDC + attestation publishing for the SLSA v1.2 Build
      # Track L3 provenance attestation produced below. Job-level
      # `permissions:` REPLACES the workflow-level `contents: read`
      # default, so keep `contents: read` explicit (we don't need any
      # broader write).
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: ${{ needs.verify.outputs.release_commit }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install package + build backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Run full test suite
        run: pytest -q

      - name: Build wheel + sdist
        run: python -m build

      - name: Check distributions
        run: |
          pip install twine
          twine check dist/*

      - name: Generate SLSA Build Provenance attestation
        # Produces a Sigstore-signed in-toto attestation linking the
        # workflow run + commit SHA to every artifact under dist/.
        # Closes the SLSA v1.2 Build Track L3 gap (Phase-3 cross-check):
        # PyPI OIDC trusted publishing already provides L2; this step
        # adds a verifier-checkable provenance record in Sigstore's
        # public transparency log.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4
        with:
          subject-path: 'dist/*'

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist-${{ needs.verify.outputs.version }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI (OIDC)
    needs: [verify, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/relay-shell
    permissions:
      # Job-level `permissions:` REPLACES the workflow-level block. OIDC
      # for trusted publishing needs id-token; `actions/download-artifact`
      # needs `actions: read` to fetch the artifact uploaded by the
      # previous job; `contents: read` is the minimum for the repo
      # context the action expects.
      id-token: write
      actions: read
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist-${{ needs.verify.outputs.version }}
          path: dist/

      - name: Publish via PyPI trusted publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          # Make a workflow re-run after a successful upload idempotent
          # instead of failing on "file already exists" - the runbook
          # documents `workflow_dispatch` as the recovery path when PyPI
          # was flaky mid-publish.
          skip-existing: true
