# GitHub Pages (Jekyll) configuration for the relay-shell documentation site.
#
# Build & deployment is enabled once, in the repository settings:
#   Settings -> Pages -> Build and deployment
#     Source: Deploy from a branch
#     Branch: main   /   folder: /docs
# GitHub then builds this folder with Jekyll and serves it at
#   https://rmednitzer.github.io/relay-shell/
#
# GitHub Pages enables the jekyll-relative-links and jekyll-optional-front-matter
# plugins by default, so the existing inter-document `.md` links resolve to the
# rendered pages and the front-matter-less docs render unmodified. The only
# Liquid-looking tokens in docs/ are the GitHub Actions `${{ ... }}` style
# examples in runbook.md, which sit inside a `{% raw %}` guard so Liquid does
# not try to evaluate them — an unguarded `{{` / `{%` aborts the whole build.
title: relay-shell
description: >-
  A governed Model Context Protocol relay for complete shell and SSH operation:
  central audit, tiered authority, secret redaction, and resource bounds.
# Dark theme. jekyll-theme-midnight is a GitHub-Pages-supported theme, so it
# works with the legacy /docs build (no remote_theme needed); jekyll-theme-hacker
# is the other supported dark option (black + green monospace, terminal style).
theme: jekyll-theme-midnight
